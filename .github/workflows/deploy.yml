name: Deploy to Azure
on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm run install:all
      - run: npm run build
      - run: npm install --omit=dev --prefix backend

      - name: Assemble deploy package
        run: |
          mkdir -p deploy/backend deploy/frontend
          cp -r backend/* deploy/backend/
          cp -r frontend/dist deploy/frontend/dist
          cd deploy && zip -r ../deploy.zip . -x '.*'

      - uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (zip deploy)
        run: |
          az webapp deploy --resource-group gameroom-rg --name la-pryor \
            --src-path deploy.zip --type zip
